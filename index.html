<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Spotify</title>

    <!-- ICONES -->
    <script src="https://kit.fontawesome.com/f4fc4c5bfe.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/iconspotify.png">
</head>
<body>

<div class="container">

    <nav class="sidebar">
        <h1>Spotify</h1>
        <p> Início</p>
        <p> Buscar</p>
        <p> Biblioteca</p>
    </nav>

    <main>
        <input class="search" placeholder="O que você quer ouvir?">

        <h2>Suas músicas</h2>
        <div class="albums-grid"></div>
    </main>

</div>

<!-- PLAYER -->
<footer class="player">

    <div class="music-info">
        <img id="cover">
        <div>
            <h4 id="music-name">Nada tocando</h4>
            <p id="artist-name"></p>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevMusic()"><i class="fa-solid fa-backward"></i></button>
        <button id="playBtn" onclick="togglePlay()">
            <i class="fa-solid fa-play"></i>
        </button>
        <button onclick="nextMusic()"><i class="fa-solid fa-forward"></i></button>
    </div>

    <div class="extra-controls">
        <span id="current-time">0:00</span>

        <input type="range" id="progress" value="0">

        <span id="duration">0:00</span>

        <i class="fa-solid fa-volume-high"></i>
        <input type="range" id="volume" min="0" max="1" step="0.01">
    </div>

</footer>

<script src="script.js"></script>
</body>
</html>
